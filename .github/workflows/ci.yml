name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - name: Typecheck & build
        run: npm run build
        env:
          VITE_USDC_MINT: "11111111111111111111111111111111"

  anchor-build:
    name: Anchor build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # setup-anchor installs Solana CLI which bundles an older Cargo.
      # dtolnay MUST run AFTER so its Cargo (1.94) takes PATH precedence
      # over the bundled one (1.75). edition2024 crates need Cargo 1.85+.
      - uses: heyAyushh/setup-anchor@v4.1
        with:
          anchor-version: 0.32.0
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: programs/meridian
      - run: anchor build

  anchor-test:
    name: Anchor test (52 tests)
    runs-on: ubuntu-latest
    needs: anchor-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: heyAyushh/setup-anchor@v4.1
        with:
          anchor-version: 0.32.0
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: programs/meridian
      - name: Generate dev wallets
        run: npx tsx scripts/dev-wallets.ts
      - name: Run tests
        run: anchor test
