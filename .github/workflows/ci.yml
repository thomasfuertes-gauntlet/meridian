name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - name: Typecheck & build
        run: npm run build
        env:
          VITE_USDC_MINT: "11111111111111111111111111111111"

  anchor:
    name: Anchor build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Rust 1.94 for host-side compilation (anchor test uses host rustc).
      # Must run before setup-anchor so rustup is initialized.
      - uses: dtolnay/rust-toolchain@1.94.0

      # Pin Solana 3.1.10 - 'stable' default resolves to 1.x with
      # Cargo 1.75, which can't parse edition2024 crates.
      - uses: heyAyushh/setup-anchor@v4.1
        with:
          anchor-version: 0.32.0
          solana-cli-version: 3.1.9

      # setup-anchor + setup-solana handle their own caching.
      # rust-cache covers the program build artifacts.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: programs/meridian

      # Anchor calls `cargo +solana build-sbf` which needs rustup's
      # cargo proxy to resolve +toolchain syntax. Solana CLI may put
      # a raw cargo on PATH that doesn't understand it.
      - name: Ensure rustup cargo proxy on PATH
        run: |
          rustup default 1.94.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - run: anchor build
      - name: Generate dev wallets
        run: npx tsx scripts/dev-wallets.ts
      - name: Run tests
        run: anchor test --skip-build
