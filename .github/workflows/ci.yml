name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast path-filter for PRs: skip anchor job on frontend-only changes
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      anchor: ${{ steps.filter.outputs.anchor }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            anchor:
              - 'programs/**'
              - 'tests/**'
              - 'Anchor.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'tsconfig.json'
              - '.github/workflows/ci.yml'

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - name: Typecheck & build
        run: npm run build
        env:
          VITE_USDC_MINT: "11111111111111111111111111111111"

  anchor:
    name: Anchor build + test
    needs: changes
    # Always run on push to main; on PRs only when anchor-relevant paths changed
    if: always() && (github.event_name == 'push' || needs.changes.outputs.anchor == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Rust 1.94 for host-side compilation (anchor test uses host rustc).
      # Must run before setup-anchor so rustup is initialized.
      - uses: dtolnay/rust-toolchain@1.94.0

      # Pin Solana 3.1.10 - 'stable' default resolves to 1.x with
      # Cargo 1.75, which can't parse edition2024 crates.
      - uses: heyAyushh/setup-anchor@v4.1
        with:
          anchor-version: 0.32.0
          solana-cli-version: 3.1.9

      # Cache the compiled BPF .so keyed on program source.
      # On hit, skip anchor build entirely (~5 min saved).
      - name: Cache anchor build artifacts
        id: anchor-build-cache
        uses: actions/cache@v4
        with:
          path: target/deploy/
          key: anchor-deploy-${{ hashFiles('programs/**/*.rs', 'programs/**/Cargo.toml', 'Cargo.lock', 'Anchor.toml') }}

      # Only needed when we actually build
      - uses: Swatinem/rust-cache@v2
        if: steps.anchor-build-cache.outputs.cache-hit != 'true'
        with:
          workspaces: programs/meridian

      - name: Ensure rustup cargo proxy on PATH
        if: steps.anchor-build-cache.outputs.cache-hit != 'true'
        run: |
          rustup default 1.94.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Anchor build
        if: steps.anchor-build-cache.outputs.cache-hit != 'true'
        run: anchor build
      - name: Generate dev wallets
        run: npx tsx scripts/dev-wallets.ts
      - name: Run tests
        run: anchor test --skip-build
