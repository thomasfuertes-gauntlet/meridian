name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - name: Typecheck & build
        run: npm run build
        env:
          VITE_USDC_MINT: "11111111111111111111111111111111"

  anchor:
    name: Anchor build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Rust toolchain FIRST so its Cargo (1.94) is on PATH before
      # setup-anchor's bundled Solana CLI Cargo (1.75). edition2024
      # crates need Cargo 1.85+.
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: heyAyushh/setup-anchor@v4.1
        with:
          anchor-version: 0.32.0

      # Cache Solana CLI + Anchor binary + Cargo registry
      - uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana
            ~/.cargo/bin/anchor
            ~/.cargo/registry
            ~/.cargo/git
          key: solana-anchor-${{ runner.os }}-anchor0.32-solana3.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: programs/meridian

      # Anchor runs `cargo +solana build-sbf` which requires rustup's
      # cargo proxy (understands +toolchain syntax). Solana CLI puts
      # its own raw cargo on PATH which breaks this. Ensure rustup's
      # bin dir comes first, and set 1.94 as default for non-Solana builds.
      - name: Fix Cargo to use rustup proxy
        run: |
          rustup default 1.94.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - run: anchor build
      - name: Generate dev wallets
        run: npx tsx scripts/dev-wallets.ts
      - name: Run tests
        run: anchor test --skip-build
